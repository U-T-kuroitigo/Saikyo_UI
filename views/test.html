<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test · Saikyo_UI</title>
    <!-- Tailwind CSS (CDN) 開発確認用 -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <header class="bg-sky-500 text-white font-bold p-4">
      Saikyo_UI · Test Page
    </header>

    <main class="max-w-2xl mx-auto mt-8 bg-white p-6 rounded-xl shadow">
      <h1 class="text-2xl font-semibold mb-4">外部APIメニュー取得テスト</h1>

      <p class="text-sm text-slate-600 mb-4">
        このページは Tailwind + JS を使って
        <code>/api/menu</code> にアクセスし、 外部API
        <code>https://kakigori-api.fly.dev/v1/stores/{STORE_ID}/menu</code>
        の結果を表示します。
      </p>

      <!-- 送信フォーム（今回はクエリ無しでメニュー一覧取得。将来ここに検索条件などを追加） -->
      <form id="menuForm" class="space-y-3">
        <div>
          <label class="block text-sm font-medium">Store ID（参照のみ）</label>
          <input
            id="storeId"
            type="text"
            class="mt-1 w-full rounded border px-3 py-2 bg-slate-100"
            value="{{.StoreID}}"
            readonly
          />
        </div>
        <button
          type="submit"
          class="inline-flex items-center gap-2 rounded-lg bg-sky-600 text-white px-4 py-2 hover:bg-sky-700"
        >
          メニューを取得
        </button>
      </form>

      <div id="status" class="mt-4 text-sm text-slate-600"></div>

      <pre
        id="result"
        class="mt-4 bg-slate-900 text-slate-100 p-4 rounded overflow-x-auto text-sm"
      ></pre>
    </main>

    <script>
      // フロントJS：フォーム送信で /api/menu を叩いて結果表示
      const form = document.getElementById("menuForm");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        statusEl.textContent = "読み込み中...";
        resultEl.textContent = "";

        try {
          const res = await fetch("/api/menu", { method: "GET" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const json = await res.json();
          statusEl.textContent = "取得成功";
          resultEl.textContent = JSON.stringify(json, null, 2);
        } catch (err) {
          statusEl.textContent = "エラー: " + err.message;
        }
      });
    </script>
  </body>
</html>
